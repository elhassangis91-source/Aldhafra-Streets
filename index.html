<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة الظفرة الذكية</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js?v=2"></script>
</head>
<body>

    <div id="sidebar">
        <div id="resizer"></div>
        
        <div class="sidebar-content">
            <div class="sidebar-tabs">
                <button class="tab-btn active" onclick="openTab('search-tab')">🔍 البحث</button>
                <button class="tab-btn" onclick="openTab('ai-tab')">🤖 مساعد AI</button>
            </div>

            <div id="search-tab" class="tab-content active">
                <div class="sidebar-header">
                    <input type="text" id="searchBox" placeholder="ابحث بالاسم أو الرقم التعريفي...">
                    <div id="stats">جاري جلب البيانات...</div>
                </div>
                <div id="resultsList"></div>
            </div>

            <div id="ai-tab" class="tab-content">
                <div class="chat-container">
                    <div id="chat-box">
                        <div class="bot-msg">أهلاً بك يا هندسة! أنا مساعدك الذكي. اسألني عن أطوال الشوارع، إحصائيات المدن، أو اطلب معلومات عن شارع معين.</div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="ai-input" placeholder="اكتب سؤالك هنا...">
                        <button id="send-ai-btn">إرسال</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
